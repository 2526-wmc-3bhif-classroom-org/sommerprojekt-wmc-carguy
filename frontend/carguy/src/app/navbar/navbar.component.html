<div class="navbar border-b border-white/10 px-4 lg:px-8 h-16 lg:h-20 fixed z-50 flex items-center justify-between bg-base-100/80 backdrop-blur">

  <a class="flex items-center gap-3 cursor-pointer group" [routerLink]="['']">
    <div class="h-10 aspect-[3645/1607] bg-accent shrink-0 transition-transform duration-300 group-hover:scale-110"
         style="-webkit-mask-image: url('/logo-thick.png');
                mask-image: url('/logo-thick.png');
                -webkit-mask-size: contain;
                mask-size: contain;
                -webkit-mask-repeat: no-repeat;
                mask-repeat: no-repeat;
                -webkit-mask-position: center;
                mask-position: center;"
         title="Logo"></div>
    <span class="text-xl font-bold text-accent opacity-90 transition-opacity duration-300 group-hover:opacity-100">CarGuy</span>
  </a>

  <div class="flex-1 max-w-xl mx-8">
    <div class="form-control w-full relative">
    <span class="absolute inset-y-0 left-3 flex items-center text-base-content/70">
    </span>
      <input type="text"
             placeholder="Search brands, models, or topics..."
             class="input input-bordered w-full bg-white/5 border-white/10 pl-10 focus:border-cg-primary" />
    </div>
  </div>

  <div class="flex-center gap-10">
    <ul class="menu menu-horizontal px-1 font-medium gap-4">
      <li><a class="hover:text-primary" [routerLink]="['']">Brands</a></li>
      <li><a class="hover:text-primary" [routerLink]="['guides']">Guides</a></li>
      <li><a class="hover:text-primary" [routerLink]="['communities']">Communities</a></li>
    </ul>
  </div>

  <div class="p-32">

  </div>

    <label class="swap swap-rotate">
      <!-- this hidden checkbox controls the state -->
      <input type="checkbox" class="theme-controller" value="dark" />

      <!-- sun icon -->
      <svg
        class="swap-off h-6 w-6 fill-current"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24">
        <path
          d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
      </svg>

      <!-- moon icon -->
      <svg
        class="swap-on h-6 w-6 fill-current"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24">
        <path
          d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
      </svg>
    </label>
  @if (isLoggedIn){
    <a class="flex items-center gap-2" [routerLink]="['profile']">
      <div class="rounded-4xl bg-accent h-10 w-10 hover:rounded-sm duration-300 ease-in"></div>
      <span class="text-primary">Profile</span>
    </a>
  } @else {
    <a class="flex items-center gap-2" [routerLink]="['login']">
      <span class="text-primary">Log in or Register</span>
    </a>
  }
</div>
