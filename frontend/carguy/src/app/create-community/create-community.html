<div class="min-h-screen flex items-center justify-center bg-base-100 px-4 relative overflow-hidden">
  <!-- Ambient glow -->
  <div class="ambient-glow"></div>

  <div class="relative z-10 w-full max-w-md bg-base-200 border border-base-content/10 rounded-2xl p-8 shadow-xl">
    <!-- Logo / Branding -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-accent mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
          <circle cx="7" cy="17" r="2" />
          <path d="M9 17h6" />
          <circle cx="17" cy="17" r="2" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-accent mb-1">Create a Community</h1>
      <p class="text-base-content/50 text-sm">
        Build and grow your own corner of CarGuy.
      </p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="flex items-center gap-2 px-4 py-3 rounded-lg bg-error/10 border border-error/20 text-error mb-5 text-sm error-slide-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="15" y1="9" x2="9" y2="15" />
        <line x1="9" y1="9" x2="15" y2="15" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="createCommunity()" #communityForm="ngForm" class="flex flex-col gap-5 form-fade-in">
      <div class="flex flex-col gap-1.5">
        <label for="community-name" class="text-xs font-medium text-base-content/70 pl-0.5">Community Name</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input id="community-name" type="text" [(ngModel)]="name" name="name" class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25" placeholder="e.g. Classic Cars" required />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="community-description" class="text-xs font-medium text-base-content/70 pl-0.5">Description</label>
        <div class="relative">
           <textarea id="community-description" [(ngModel)]="description" name="description" class="textarea w-full bg-white/5 border-white/10 pl-3 focus:border-primary text-base-content placeholder:text-base-content/25 h-24" placeholder="A short description of your community" required></textarea>
        </div>
      </div>

      <button type="submit" class="btn bg-accent text-base-content border-none hover:bg-accent/80 w-full mt-2 gap-2" [disabled]="!communityForm.valid || isLoading">
        <span *ngIf="isLoading" class="loading loading-spinner loading-sm"></span>
        <span *ngIf="isLoading">Creating...</span>
        <span *ngIf="!isLoading">Create Community</span>
        <svg *ngIf="!isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="8.5" cy="7" r="4" />
            <line x1="20" y1="8" x2="20" y2="14" />
            <line x1="23" y1="11" x2="17" y2="11" />
        </svg>
      </button>
    </form>
  </div>
</div>
