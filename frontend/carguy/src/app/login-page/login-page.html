<div class="min-h-screen flex items-center justify-center bg-cg-neutral px-4">
  <div class="card w-full max-w-md bg-[#18181b] border border-white/5 p-8 shadow-xl">
    <h1 class="text-3xl font-bold text-center text-cg-primary mb-2">Welcome Back</h1>
    <p class="text-center text-gray-400 mb-8">Login to your CarGuy account</p>

    <form (ngSubmit)="login()" #loginForm="ngForm" class="space-y-6">
      <div class="form-control w-full">
        <label class="label">
          <span class="label-text text-gray-300">Username</span>
        </label>
        <input type="text" [(ngModel)]="username" name="username" class="input input-bordered w-full bg-white/5 border-white/10 focus:border-cg-primary" placeholder="Enter your username" required>
      </div>

      <div class="form-control w-full">
        <label class="label">
          <span class="label-text text-gray-300">Password</span>
        </label>
        <input type="password" [(ngModel)]="password" name="password" class="input input-bordered w-full bg-white/5 border-white/10 focus:border-cg-primary" placeholder="Enter your password" required>
      </div>

      <div class="flex flex-col gap-4 mt-6">
        <button type="submit" class="btn bg-cg-primary text-white border-none hover:bg-opacity-90 w-full" [disabled]="!loginForm.valid">Login</button>
        <button type="button" (click)="register()" class="btn btn-outline border-white/10 hover:border-cg-accent hover:bg-transparent hover:text-cg-accent w-full">Register</button>
      </div>
    </form>
  </div>
</div>
