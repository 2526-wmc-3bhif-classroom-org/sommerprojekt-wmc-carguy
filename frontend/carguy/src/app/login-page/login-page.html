<div class="min-h-screen flex items-center justify-center bg-base-100 px-4 relative overflow-hidden">
  <!-- Ambient glow -->
  <div class="ambient-glow"></div>

  <div class="relative z-10 w-full max-w-md bg-base-200 border border-white/5 rounded-2xl p-8 shadow-xl">
    <!-- Logo / Branding -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-accent mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
          <circle cx="7" cy="17" r="2" />
          <path d="M9 17h6" />
          <circle cx="17" cy="17" r="2" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-accent mb-1">CarGuy</h1>
      <p class="text-base-content/50 text-sm">
        {{ activeTab === 'login' ? 'Welcome back, gearhead.' : 'Join the community.' }}
      </p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher relative flex bg-base-300 rounded-lg p-1 mb-6">
      <button class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-md relative z-10 transition-colors duration-200"
        [class]="activeTab === 'login' ? 'text-white' : 'text-base-content/50'"
        (click)="switchTab('login')">
        Log In
      </button>
      <button class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-md relative z-10 transition-colors duration-200"
        [class]="activeTab === 'register' ? 'text-white' : 'text-base-content/50'"
        (click)="switchTab('register')">
        Register
      </button>
      <div class="tab-indicator absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-accent rounded-md transition-transform duration-300 ease-out"
        [class.translate-x-full]="activeTab === 'register'"></div>
    </div>

    <!-- Error Message -->
    @if (errorMessage) {
    <div class="flex items-center gap-2 px-4 py-3 rounded-lg bg-error/10 border border-error/20 text-error mb-5 text-sm error-slide-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="15" y1="9" x2="9" y2="15" />
        <line x1="9" y1="9" x2="15" y2="15" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    }

    <!-- Login Form -->
    @if (activeTab === 'login') {
    <form (ngSubmit)="login()" #loginForm="ngForm" class="flex flex-col gap-5 form-fade-in">
      <div class="flex flex-col gap-1.5">
        <label for="login-username" class="text-xs font-medium text-base-content/70 pl-0.5">Username</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input id="login-username" type="text" [(ngModel)]="username" name="username"
            class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
            placeholder="Enter your username" required autocomplete="username" />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="login-password" class="text-xs font-medium text-base-content/70 pl-0.5">Password</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input id="login-password" type="password" [(ngModel)]="password" name="password"
            class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
            placeholder="Enter your password" required autocomplete="current-password" />
        </div>
      </div>

      <button type="submit" class="btn bg-accent text-white border-none hover:bg-accent/80 w-full mt-2 gap-2" [disabled]="!loginForm.valid || isLoading">
        @if (isLoading) {
        <span class="loading loading-spinner loading-sm"></span>
        <span>Logging in...</span>
        } @else {
        <span>Log In</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
        }
      </button>
    </form>
    }

    <!-- Register Form -->
    @if (activeTab === 'register') {


    <form (ngSubmit)="register()" #registerForm="ngForm" class="flex flex-col gap-5 form-fade-in">
      <div class="flex flex-col gap-1.5">
        <label for="reg-publicname" class="text-xs font-medium text-base-content/70 pl-0.5">Public Name</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input id="reg-publicname" type="text" [(ngModel)]="publicname" name="publicname"
                 class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
                 placeholder="Choose a public name" required autocomplete="publicname" />
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <label for="reg-username" class="text-xs font-medium text-base-content/70 pl-0.5">Username</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input id="reg-username" type="text" [(ngModel)]="username" name="username"
            class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
            placeholder="Choose a username" required autocomplete="username" />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="reg-password" class="text-xs font-medium text-base-content/70 pl-0.5">Password</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input id="reg-password" type="password" [(ngModel)]="password" name="password"
            class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
            placeholder="Create a password" required autocomplete="new-password" />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="reg-confirm" class="text-xs font-medium text-base-content/70 pl-0.5">Confirm Password</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          <input id="reg-confirm" type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
            class="input w-full bg-white/5 border-white/10 pl-11 focus:border-primary text-base-content placeholder:text-base-content/25"
            placeholder="Confirm your password" required autocomplete="new-password" />
        </div>
      </div>

      <button type="submit" class="btn bg-accent text-white border-none hover:bg-primary/80 w-full mt-2 gap-2" [disabled]="!registerForm.valid || isLoading">
        @if (isLoading) {
        <span class="loading loading-spinner loading-sm"></span>
        <span>Creating account...</span>
        } @else {
        <span>Create Account</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="8.5" cy="7" r="4" />
          <line x1="20" y1="8" x2="20" y2="14" />
          <line x1="23" y1="11" x2="17" y2="11" />
        </svg>
        }
      </button>
    </form>
    }

    <!-- Footer -->
    <p class="text-center text-xs text-base-content/30 mt-7 leading-relaxed">
      By continuing, you agree to CarGuy's Terms&nbsp;of&nbsp;Service.
    </p>
  </div>
</div>
